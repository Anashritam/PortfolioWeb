spring.application.name=portfolio-api
server.port=8081

app.cors.allowed-origin=http://localhost:5173
app.jwt.secret=${JWT_SECRET:change-this-development-secret-change-this-development-secret}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:480}
app.upload-dir=${UPLOAD_DIR:uploads}

spring.datasource.url=${DB_URL:jdbc:h2:mem:portfolio_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
