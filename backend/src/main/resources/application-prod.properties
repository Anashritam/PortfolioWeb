# ── Production profile ────────────────────────────────────────────────
# Activated via SPRING_PROFILES_ACTIVE=prod on Render

server.port=${PORT:8081}

# PostgreSQL connection (set via Render environment variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Use PostgreSQL-compatible migrations
spring.flyway.locations=classpath:db/migration_pg

# CORS — allow the Render URL
app.cors.allowed-origin=${CORS_ORIGIN:*}

# Disable format_sql in prod for performance
spring.jpa.properties.hibernate.format_sql=false
